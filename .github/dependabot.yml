# Note: the CI and Deploy workflows are currently configured for
# workflow_dispatch only (see ci.yml / deploy.yml). Dependabot PRs
# opened here will NOT trigger automated checks until those triggers
# are re-enabled; run `./scripts/ci-local.sh` on each Dependabot
# branch before merging.

version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns:
          - astro
          - "@astrojs/*"
      dev-dependencies:
        dependency-type: development
    ignore:
      # @types/node tracks the Node.js major it describes. engines.node is
      # `>=22.12.0`, so the @types/node major must stay on 22.x — newer
      # majors describe runtime APIs we don't ship against.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: terraform
    directory: "/infra"
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    groups:
      terraform-providers:
        patterns:
          - "*"
