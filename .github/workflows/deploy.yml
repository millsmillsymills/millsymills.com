name: Deploy

# TEMPORARY: per-push automatic triggers are disabled while we're over
# the GitHub Actions minute quota. Deploys can still be kicked off via
# the Actions tab (workflow_dispatch); they just won't chain off a
# push to main until the workflow_run trigger below is uncommented.
#
# The monthly `schedule` trigger IS active — it rebuilds + redeploys
# once per month so /.well-known/security.txt's `Expires:` field
# (build_time + 12mo) never silently goes stale.
#
# Trust model: this repo is on the GitHub free-private plan, which
# DOES NOT support required-reviewer protection on Environments. The
# API returns HTTP 422 ("Failed to create the environment protection
# rule. Please ensure the billing plan supports the required reviewers
# protection rule.") — confirmed during the p41m0n rehearsal. So
# every scheduled and dispatched run deploys UNATTENDED. The trust
# boundary is enforced entirely by:
#   - OIDC sub = `repo:<owner/name>:environment:production`
#   - OIDC job_workflow_ref pinned to THIS file on `refs/heads/main`
#     (so a different workflow on main, even one declaring the same
#     environment, cannot mint the deploy role's token). Splitting
#     this workflow into multiple jobs does NOT change job_workflow_ref
#     — that claim is per-workflow, so adding `build` and `deploy`
#     jobs alongside the SLSA provenance step keeps every locally-
#     authored job under the existing IAM pin.
#   - IAM role scoped to s3:PutObject/DeleteObject/GetObject (plus
#     the read/list scaffolding `aws s3 sync` requires —
#     s3:ListBucket and s3:GetBucketLocation) on the prod S3 bucket,
#     and cloudfront:CreateInvalidation/GetInvalidation on its
#     distribution. See `infra/github_oidc.tf` for the exact policy.
# A maintainer who can push to `main` bypasses any reviewer gate by
# approving themselves anyway, so for a personal portfolio the
# OIDC-pin + IAM-scope model is the load-bearing protection — not the
# missing reviewer step. Upgrade to GitHub Pro ($4/mo) to add a
# reviewer gate if the unattended-monthly-deploy property becomes
# unacceptable. See `infra/github_oidc.tf` for the trust policy.
#
# SLSA L3 + sigstore: each deploy ships `dist.tar.gz`, a cosign
# keyless signature (`.sig` + `.pem`), and a SLSA v1.0 build-L3
# provenance attestation (`dist.tar.gz.intoto.jsonl`) under
# `/.well-known/slsa/` on the site. The provenance is generated by
# the slsa-framework reusable workflow — that's the trusted-builder
# requirement for L3 — so a visitor can `cosign verify-blob` and
# `slsa-verifier verify-artifact` against a fresh download. See the
# `slsa-provenance` entry in src/data/security-controls.ts for the
# verify command.
on:
  workflow_dispatch:
  schedule:
    # 1st of each month, 03:00 UTC. Closes #153.
    - cron: '0 3 1 * *'
  # workflow_run:
  #   workflows: ['CI']
  #   types: [completed]

permissions:
  contents: read
  id-token: write # required for AWS OIDC + sigstore keyless signing

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build:
    name: Build + SBOM + tarball
    runs-on: ubuntu-24.04

    # Gate: manual dispatch, monthly schedule, OR CI succeeded on main.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          github.event_name == 'schedule' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main') }}

    # Pull `vars.SITE_URL` (and friends) from the production environment.
    # Required because typecheck + build read env-scoped vars; without this
    # binding, `vars.SITE_URL` resolves to '' and astro.config.mjs rejects
    # the build. The deploy job below targets the same environment for
    # OIDC + IAM scoping.
    environment:
      name: production
      url: https://${{ vars.SITE_DOMAIN }}

    permissions:
      contents: read
      id-token: write

    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - uses: actions/checkout@v6
        with:
          # On workflow_run we must explicitly check out the SHA that
          # triggered CI — the default would be main's tip at queue
          # time, which may have moved.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Inline test run because automatic CI is disabled (see ci.yml header).
      # Without this, a manual workflow_dispatch could ship code with failing
      # vitest assertions. Drop when the CI workflow_run gate is re-enabled.
      - name: Test (vitest)
        run: npm test

      # Inline typecheck because automatic CI is disabled (see ci.yml header).
      # Without this, a manual workflow_dispatch could ship code that fails
      # `astro check`. Drop this step when the CI workflow_run gate is
      # re-enabled.
      #
      # `astro check` loads astro.config.mjs, which exits 1 when CI=true
      # without SITE_URL. GitHub sets CI=true on every step, so the
      # typecheck step needs SITE_URL too — not just the build step.
      - name: Typecheck (astro check)
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run check

      - name: Build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run build

      # Generate an SPDX-JSON SBOM from the source tree and place it
      # inside dist/ so it ships with the site at /.well-known/sbom.spdx.json.
      # The action also uploads a copy as a workflow artifact (90-day
      # retention) for retroactive lookup. Closes #143.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/.well-known/sbom.spdx.json
          artifact-name: sbom.spdx.json

      # Symmetric to deploy-rehearsal.yml's leakage check — catches a hardcoded
      # rehearsal URL accidentally shipping to prod. No untrusted github.event
      # context used. Run after SBOM generation so the SBOM is included in the
      # grep — a future dep referencing https://millsymills.com would surface here.
      - name: Assert no rehearsal URL leakage
        run: ./scripts/assert-no-rehearsal-leakage.sh

      # Tar the dist/ tree so we can sign + attest a single artifact and
      # (in the deploy job) extract it back to sync. Hash the tarball
      # in the form the SLSA generator expects (`base64(sha256+name+nl)`).
      - name: Tar dist/
        run: tar -czf dist.tar.gz dist/

      - name: Hash tarball for SLSA provenance
        id: hash
        run: |
          set -euo pipefail
          hashes=$(sha256sum dist.tar.gz | base64 -w0)
          echo "hashes=${hashes}" >> "$GITHUB_OUTPUT"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-tarball
          path: dist.tar.gz
          retention-days: 7
          if-no-files-found: error

  # SLSA v1.0 build-L3 provenance. The reusable workflow runs as its
  # own GitHub-trusted builder so the resulting attestation is non-
  # forgeable per the L3 requirement; the provenance job_workflow_ref
  # claim points at the slsa-github-generator workflow file, NOT this
  # one, which is exactly what L3 wants. Output is uploaded as a
  # workflow artifact named after `provenance-name`.
  provenance:
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      provenance-name: dist.tar.gz.intoto.jsonl
      upload-assets: false
      # This repo is private. Without this override, the SLSA generator
      # halts in `privacy-check` to avoid exposing the private repo name
      # via the public Rekor transparency log. We deliberately want the
      # repo identity in Rekor — the whole point is verifiable provenance
      # tied to this repo + commit + workflow.
      private-repository: true

  deploy:
    name: Sign + sync to S3 + invalidate CloudFront
    needs: [build, provenance]
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      id-token: write

    # Targets the `production` GitHub Environment for variable
    # scoping (`vars.SITE_DOMAIN` etc. resolve from this env). On the
    # free-private plan there is no required-reviewer gate — see the
    # trust-model block at the top of this file. The OIDC sub claim
    # in the IAM trust policy is bound to `environment:production`,
    # so the env name is the load-bearing claim, not just metadata.
    environment:
      name: production
      url: https://${{ vars.SITE_DOMAIN }}

    steps:
      - name: Download tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-tarball
          path: .

      - name: Download provenance attestation
        uses: actions/download-artifact@v4
        with:
          name: dist.tar.gz.intoto.jsonl
          path: .

      - name: Extract dist tarball
        run: tar -xzf dist.tar.gz

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Keyless sign-blob — Fulcio mints a short-lived cert tied to
      # this job's OIDC token (sub=environment:production), Rekor
      # records the inclusion-proof transparency entry, and we end up
      # with `dist.tar.gz.sig` + `dist.tar.gz.pem` that anyone can
      # verify against the OIDC issuer + identity below. No long-lived
      # signing key to manage or rotate.
      - name: Cosign sign-blob (keyless)
        env:
          COSIGN_YES: 'true'
        run: |
          set -euo pipefail
          cosign sign-blob \
            --output-signature dist.tar.gz.sig \
            --output-certificate dist.tar.gz.pem \
            dist.tar.gz

      # Place the four artifacts inside dist/ so the existing S3 sync
      # publishes them at /.well-known/slsa/<file> alongside the rest
      # of the site. Visitors can `curl` them directly from the canonical
      # domain rather than from a separate release surface.
      - name: Stage SLSA artifacts under /.well-known/slsa/
        run: |
          set -euo pipefail
          mkdir -p dist/.well-known/slsa
          cp dist.tar.gz dist.tar.gz.sig dist.tar.gz.pem dist.tar.gz.intoto.jsonl \
            dist/.well-known/slsa/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync dist/ to S3
        run: aws s3 sync dist/ "s3://${{ vars.SITE_DOMAIN }}" --delete

      - name: Invalidate CloudFront
        run: >-
          aws cloudfront create-invalidation
          --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
          --paths "/*"
