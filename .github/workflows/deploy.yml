name: Deploy

# TEMPORARY: per-push automatic triggers are disabled while we're over
# the GitHub Actions minute quota. Deploys can still be kicked off via
# the Actions tab (workflow_dispatch); they just won't chain off a
# push to main until the workflow_run trigger below is uncommented.
#
# The monthly `schedule` trigger IS active — it rebuilds + redeploys
# once per month so /.well-known/security.txt's `Expires:` field
# (build_time + 12mo) never silently goes stale.
#
# Trust model: every scheduled and dispatched run currently deploys
# UNATTENDED. The repo is on the GitHub Pro plan as of #144, so a
# required-reviewer protection rule on the `production` environment
# IS now possible (Pro is the threshold; the free-private plan
# previously rejected the API with HTTP 422). It is intentionally
# NOT yet enabled, because turning it on would block the monthly
# `schedule:` deploy on a manual approval -- the unattended cron is
# what keeps /.well-known/security.txt's `Expires:` field fresh.
# The trust boundary is enforced by:
#   - OIDC sub = `repo:<owner/name>:environment:production`
#   - OIDC job_workflow_ref pinned to THIS file on `refs/heads/main`
#     (so a different workflow on main, even one declaring the same
#     environment, cannot mint the deploy role's token). Splitting
#     this workflow into multiple jobs does NOT change job_workflow_ref
#     — that claim is per-workflow, so adding `build` and `deploy`
#     jobs alongside the SLSA provenance step keeps every locally-
#     authored job under the existing IAM pin.
#   - IAM role scoped to s3:PutObject/DeleteObject/GetObject (plus
#     the read/list scaffolding `aws s3 sync` requires —
#     s3:ListBucket and s3:GetBucketLocation) on the prod S3 bucket,
#     and cloudfront:CreateInvalidation/GetInvalidation on its
#     distribution. See `infra/github_oidc.tf` for the exact policy.
# A maintainer who can push to `main` bypasses any reviewer gate by
# approving themselves anyway, so for a personal portfolio the
# OIDC-pin + IAM-scope model is the load-bearing protection -- a
# required-reviewer rule would be hygiene, not the trust anchor.
# Adding it is a separate decision that has to weigh the manual-
# approval cost against the scheduled-rebuild cadence.
#
# SLSA L3 + sigstore: each deploy ships `dist.tar.gz`, a cosign
# keyless Sigstore bundle (`dist.tar.gz.cosign.bundle` — signature,
# Fulcio cert, and Rekor inclusion proof in one file), and a SLSA
# v1.0 build-L3 provenance attestation (`dist.tar.gz.intoto.jsonl`)
# under `/.well-known/slsa/` on the site. The provenance is generated by
# the slsa-framework reusable workflow — that's the trusted-builder
# requirement for L3 — so a visitor can `cosign verify-blob` and
# `slsa-verifier verify-artifact` against a fresh download. See the
# `slsa-provenance` entry in src/data/security-controls.ts for the
# verify command.
on:
  workflow_dispatch:
  schedule:
    # 1st of each month, 03:00 UTC. Closes #153.
    - cron: '0 3 1 * *'
  # workflow_run:
  #   workflows: ['CI']
  #   types: [completed]

permissions:
  contents: read
  id-token: write # required for AWS OIDC + sigstore keyless signing

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build:
    name: Build + SBOM + tarball
    runs-on: ubuntu-24.04

    # Gate: manual dispatch, monthly schedule, OR CI succeeded on main.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          github.event_name == 'schedule' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main') }}

    # Pull `vars.SITE_URL` (and friends) from the production environment.
    # Required because typecheck + build read env-scoped vars; without this
    # binding, `vars.SITE_URL` resolves to '' and astro.config.mjs rejects
    # the build. The deploy job below targets the same environment for
    # OIDC + IAM scoping.
    environment:
      name: production
      url: https://${{ vars.SITE_DOMAIN }}

    permissions:
      contents: read
      id-token: write

    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      # Belt-and-braces alongside the Terraform-managed branch protection
      # rule in infra/github_branch_protection.tf (#432). The Terraform
      # rule is enforced at apply time; this check surfaces UI drift in
      # the deploy logs without gating the deploy.
      #
      # Non-blocking (`continue-on-error: true`): reading
      # `GET /repos/{owner}/{repo}/branches/{branch}/protection/required_signatures`
      # requires admin permission on the repo, which the default
      # `GITHUB_TOKEN` does not carry regardless of `permissions:` block.
      # Until a fine-grained PAT secret with `Administration: Read` is
      # wired up to the production environment, the gh call fails with
      # HTTP 403 — which would block every deploy if this step were
      # required. Logged as a warning instead; revisit when the PAT
      # secret lands.
      - name: Verify signed-commits enforcement on main
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          enabled=$(gh api "repos/${REPO}/branches/main/protection/required_signatures" --jq '.enabled')
          if [ "${enabled}" != "true" ]; then
            echo "::warning::required_signatures drift on main: expected true, got '${enabled}'"
            exit 1
          fi
          echo "signed-commits enforcement on main: enabled"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # On workflow_run we must explicitly check out the SHA that
          # triggered CI — the default would be main's tip at queue
          # time, which may have moved.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Inline test run because automatic CI is disabled (see ci.yml header).
      # Without this, a manual workflow_dispatch could ship code with failing
      # vitest assertions. Drop when the CI workflow_run gate is re-enabled.
      - name: Test (vitest)
        run: npm test

      # Inline typecheck because automatic CI is disabled (see ci.yml header).
      # Without this, a manual workflow_dispatch could ship code that fails
      # `astro check`. Drop this step when the CI workflow_run gate is
      # re-enabled.
      #
      # `astro check` loads astro.config.mjs, which exits 1 when CI=true
      # without SITE_URL. GitHub sets CI=true on every step, so the
      # typecheck step needs SITE_URL too — not just the build step.
      - name: Typecheck (astro check)
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run check

      - name: Build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run build

      # Generate an SPDX-JSON SBOM from the source tree and place it
      # inside dist/ so it ships with the site at /.well-known/sbom.spdx.json.
      # The action also uploads a copy as a workflow artifact (90-day
      # retention) for retroactive lookup. Closes #143.
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: dist/.well-known/sbom.spdx.json
          artifact-name: sbom.spdx.json

      # Tar the dist/ tree so we can sign + attest a single artifact and
      # (in the deploy job) extract it back to sync. Hash the tarball
      # in the form the SLSA generator expects (`base64(sha256+name+nl)`).
      - name: Tar dist/
        run: tar -czf dist.tar.gz dist/

      - name: Hash tarball for SLSA provenance
        id: hash
        run: |
          set -euo pipefail
          hashes=$(sha256sum dist.tar.gz | base64 -w0)
          echo "hashes=${hashes}" >> "$GITHUB_OUTPUT"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-tarball
          path: dist.tar.gz
          retention-days: 7
          if-no-files-found: error

  # SLSA v1.0 build-L3 provenance. The reusable workflow runs as its
  # own GitHub-trusted builder so the resulting attestation is non-
  # forgeable per the L3 requirement; the provenance job_workflow_ref
  # claim points at the slsa-github-generator workflow file, NOT this
  # one, which is exactly what L3 wants. Output is uploaded as a
  # workflow artifact named after `provenance-name`.
  #
  # Deliberate SHA-pin exception: SLSA's L3 trust model authenticates
  # the published `vX.Y.Z` tag of the generator workflow itself, so
  # this `uses:` stays tag-pinned. See the slsa-github-generator
  # README's "Referencing SLSA builders and generators" section.
  #
  # v2.1.0 (latest as of 2026-05) embeds Node-20 internal action refs.
  # Blocks on upstream slsa-framework/slsa-github-generator#4490; tracked
  # locally as #389. GitHub flips the runner default to Node 24 on
  # 2026-06-02 and removes Node 20 entirely on 2026-09-16. Bump this pin
  # once upstream releases a Node-24-ready tag — see
  # scripts/assert-slsa-pin-fresh.sh, which turns the deadline into a
  # CI failure if the pin doesn't move.
  provenance:
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0  # zizmor: ignore[unpinned-uses]
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      provenance-name: dist.tar.gz.intoto.jsonl
      upload-assets: false
      # This repo is private. Without this override, the SLSA generator
      # halts in `privacy-check` to avoid exposing the private repo name
      # via the public Rekor transparency log. We deliberately want the
      # repo identity in Rekor — the whole point is verifiable provenance
      # tied to this repo + commit + workflow.
      private-repository: true

  deploy:
    name: Sign + sync to S3 + invalidate CloudFront
    needs: [build, provenance]
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      id-token: write

    # Targets the `production` GitHub Environment for variable
    # scoping (`vars.SITE_DOMAIN` etc. resolve from this env). No
    # required-reviewer gate is configured -- see the trust-model
    # block at the top of this file for why (Pro plan now permits
    # the rule, but enabling it would block the unattended monthly
    # `schedule:` deploy). The OIDC sub claim in the IAM trust
    # policy is bound to `environment:production`, so the env name
    # is the load-bearing claim, not just metadata.
    environment:
      name: production
      url: https://${{ vars.SITE_DOMAIN }}

    steps:
      - name: Download tarball artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-tarball
          path: .

      - name: Download provenance attestation
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist.tar.gz.intoto.jsonl
          path: .

      - name: Extract dist tarball
        run: tar -xzf dist.tar.gz

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      # Keyless sign-blob — Fulcio mints a short-lived cert tied to
      # this job's OIDC token (sub=environment:production), Rekor
      # records the inclusion-proof transparency entry, and we end up
      # with `dist.tar.gz.cosign.bundle` — a single Sigstore bundle that
      # contains the signature, the Fulcio cert, and the Rekor inclusion
      # proof. Anyone can verify against the OIDC issuer + identity below.
      # No long-lived signing key to manage or rotate.
      - name: Cosign sign-blob (keyless)
        env:
          COSIGN_YES: 'true'
        run: |
          set -euo pipefail
          cosign sign-blob \
            --bundle dist.tar.gz.cosign.bundle \
            dist.tar.gz

      # Place the artifacts inside dist/ so the existing S3 sync
      # publishes them at /.well-known/slsa/<file> alongside the rest
      # of the site. Visitors can `curl` them directly from the canonical
      # domain rather than from a separate release surface.
      - name: Stage SLSA artifacts under /.well-known/slsa/
        run: |
          set -euo pipefail
          mkdir -p dist/.well-known/slsa
          cp dist.tar.gz dist.tar.gz.cosign.bundle dist.tar.gz.intoto.jsonl \
            dist/.well-known/slsa/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Tiered Cache-Control: hashed `_astro/` assets are content-addressed
      # and safe to cache forever; `/.well-known/` + `*.html` must stay
      # fresh (security.txt's monthly Expires refresh, route shape) so they
      # get a 5m TTL with must-revalidate; remaining static assets (images,
      # fonts, manifests) sit in the middle at 1d.
      #
      # `--delete` is scoped to `_astro/` (pass 1) and the catch-all
      # non-hashed prefix (pass 2). HTML routes / `.well-known/` rarely
      # rename; orphans there can be cleaned manually if it happens.
      #
      # Cache-Control is applied on every upload because Astro rebuilds
      # all of dist/ on each run, making local mtime newer than the S3
      # object — so sync re-uploads and the new header lands. First deploy
      # after enabling will backfill all changed files; for any unchanged
      # objects whose metadata didn't update, force a one-time refresh
      # with: aws s3 cp s3://... s3://... --recursive --metadata-directive REPLACE --cache-control "..."
      - name: Sync _astro/ to S3 (immutable, 1y)
        env:
          SITE_DOMAIN: ${{ vars.SITE_DOMAIN }}
        run: |
          aws s3 sync dist/_astro/ "s3://${SITE_DOMAIN}/_astro/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync static assets to S3 (1d)
        env:
          SITE_DOMAIN: ${{ vars.SITE_DOMAIN }}
        run: |
          aws s3 sync dist/ "s3://${SITE_DOMAIN}" --delete \
            --exclude "_astro/*" \
            --exclude ".well-known/*" \
            --exclude "*.html" \
            --cache-control "public, max-age=86400"

      - name: Sync html + .well-known/ to S3 (5m, must-revalidate)
        env:
          SITE_DOMAIN: ${{ vars.SITE_DOMAIN }}
        run: |
          aws s3 sync dist/ "s3://${SITE_DOMAIN}" \
            --exclude "*" \
            --include "*.html" \
            --include ".well-known/*" \
            --cache-control "public, max-age=300, must-revalidate"

      - name: Invalidate CloudFront
        run: >-
          aws cloudfront create-invalidation
          --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
          --paths "/*"
