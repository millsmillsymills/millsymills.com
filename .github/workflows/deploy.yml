name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for AWS OIDC

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + sync to S3 + invalidate CloudFront
    runs-on: ubuntu-latest
    # The `production` environment MUST have required reviewers
    # configured in the repository settings. GitHub will hold this job
    # in a "Waiting" state until a reviewer explicitly approves the run.
    # See: https://docs.github.com/en/actions/deployment/targeting-different-environments/managing-environments-for-deployment#required-reviewers
    environment:
      name: production
      url: https://${{ vars.SITE_DOMAIN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync dist/ to S3
        run: aws s3 sync dist/ "s3://${{ vars.SITE_DOMAIN }}" --delete

      - name: Invalidate CloudFront
        run: >-
          aws cloudfront create-invalidation
          --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
          --paths "/*"
