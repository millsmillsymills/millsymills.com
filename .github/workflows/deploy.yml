name: Deploy

# TEMPORARY: automatic triggers are disabled while we're over the
# GitHub Actions minute quota. Deploys can still be kicked off via
# the Actions tab (workflow_dispatch); they just won't chain off a
# push to main until the workflow_run trigger below is uncommented.
on:
  workflow_dispatch:
  # workflow_run:
  #   workflows: ['CI']
  #   types: [completed]

permissions:
  contents: read
  id-token: write # required for AWS OIDC

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + sync to S3 + invalidate CloudFront
    runs-on: ubuntu-latest

    # Gate: manual dispatch OR CI succeeded on the main branch.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main') }}

    # The `production` environment MUST have required reviewers
    # configured in the repository settings. GitHub holds this job in
    # a "Waiting" state until a reviewer explicitly approves.
    # https://docs.github.com/en/actions/deployment/targeting-different-environments/managing-environments-for-deployment#required-reviewers
    environment:
      name: production
      url: https://${{ vars.SITE_DOMAIN }}

    steps:
      - uses: actions/checkout@v6
        with:
          # On workflow_run we must explicitly check out the SHA that
          # triggered CI — the default would be main's tip at queue
          # time, which may have moved.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync dist/ to S3
        run: aws s3 sync dist/ "s3://${{ vars.SITE_DOMAIN }}" --delete

      - name: Invalidate CloudFront
        run: >-
          aws cloudfront create-invalidation
          --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
          --paths "/*"
