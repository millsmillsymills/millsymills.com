name: Deploy

# TEMPORARY: per-push automatic triggers are disabled while we're over
# the GitHub Actions minute quota. Deploys can still be kicked off via
# the Actions tab (workflow_dispatch); they just won't chain off a
# push to main until the workflow_run trigger below is uncommented.
#
# The monthly `schedule` trigger IS active — it rebuilds + redeploys
# once per month so /.well-known/security.txt's `Expires:` field
# (build_time + 12mo) never silently goes stale.
#
# Trust model: every scheduled and dispatched run currently deploys
# UNATTENDED. The repo is on the GitHub Pro plan as of #144, so a
# required-reviewer protection rule on the `production` environment
# IS now possible (Pro is the threshold; the free-private plan
# previously rejected the API with HTTP 422). It is intentionally
# NOT yet enabled, because turning it on would block the monthly
# `schedule:` deploy on a manual approval -- the unattended cron is
# what keeps /.well-known/security.txt's `Expires:` field fresh.
# The trust boundary is enforced by:
#   - OIDC sub = `repo:<owner/name>:environment:production`
#   - OIDC job_workflow_ref pinned to THIS file on `refs/heads/main`
#     (so a different workflow on main, even one declaring the same
#     environment, cannot mint the deploy role's token). Splitting
#     this workflow into multiple jobs does NOT change job_workflow_ref
#     — that claim is per-workflow, so adding `build` and `deploy`
#     jobs alongside the SLSA provenance step keeps every locally-
#     authored job under the existing IAM pin.
#   - IAM role scoped to s3:PutObject/DeleteObject/GetObject (plus
#     the read/list scaffolding `aws s3 sync` requires —
#     s3:ListBucket and s3:GetBucketLocation) on the prod S3 bucket,
#     and cloudfront:CreateInvalidation/GetInvalidation on its
#     distribution. See `infra/github_oidc.tf` for the exact policy.
# A maintainer who can push to `main` bypasses any reviewer gate by
# approving themselves anyway, so for a personal portfolio the
# OIDC-pin + IAM-scope model is the load-bearing protection -- a
# required-reviewer rule would be hygiene, not the trust anchor.
# Adding it is a separate decision that has to weigh the manual-
# approval cost against the scheduled-rebuild cadence.
#
# SLSA L3 + sigstore: each deploy ships `dist.tar.gz`, a cosign
# keyless Sigstore bundle (`dist.tar.gz.cosign.bundle` — signature,
# Fulcio cert, and Rekor inclusion proof in one file), and a SLSA
# v1.0 build-L3 provenance attestation (`dist.tar.gz.intoto.jsonl`)
# under `/.well-known/slsa/` on the site. The provenance is generated by
# the slsa-framework reusable workflow — that's the trusted-builder
# requirement for L3 — so a visitor can `cosign verify-blob` and
# `slsa-verifier verify-artifact` against a fresh download. See the
# `slsa-cosign` entry in src/data/security-controls.ts for the
# verify command.
on:
  workflow_dispatch:
    inputs:
      is_retry:
        description: 'Internal: true when this run is an auto-retry of a failed scheduled run (set by the retry job). Leave false for manual dispatches.'
        type: boolean
        default: false
  schedule:
    # 1st of each month, 03:00 UTC. Closes #153.
    - cron: '0 3 1 * *'
  # workflow_run:
  #   workflows: ['CI']
  #   types: [completed]

permissions:
  contents: read
  id-token: write # required for AWS OIDC + sigstore keyless signing

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build:
    name: Build + SBOM + tarball
    runs-on: ubuntu-24.04

    # Gate: manual dispatch, monthly schedule, OR CI succeeded on main.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          github.event_name == 'schedule' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main') }}

    # Pull `vars.SITE_URL` (and friends) from the production environment.
    # Required because typecheck + build read env-scoped vars; without this
    # binding, `vars.SITE_URL` resolves to '' and astro.config.mjs rejects
    # the build. The deploy job below targets the same environment for
    # OIDC + IAM scoping.
    environment:
      name: production
      url: https://${{ vars.SITE_DOMAIN }}

    permissions:
      contents: read
      id-token: write

    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      # Branch protection on main is governed by the GitHub-UI
      # `default-branch-protection` ruleset + out-of-band required_signatures
      # (not Terraform-managed; see CLAUDE.md). This check is the sole drift
      # detector — it gates the deploy if required_signatures gets toggled
      # off in the UI.
      #
      # `GET /repos/{owner}/{repo}/branches/{branch}/protection/required_signatures`
      # requires admin permission on the repo, which the default
      # `GITHUB_TOKEN` does not carry regardless of `permissions:` block.
      # We use a fine-grained PAT scoped to this repo with
      # `Administration: Read` and nothing else, stored on the production
      # environment as `BRANCH_PROTECTION_READ_TOKEN`. See CLAUDE.md
      # "Secrets and PAT rotation" for the rotation cadence.
      - name: Verify signed-commits enforcement on main
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_READ_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          enabled=$(gh api "repos/${REPO}/branches/main/protection/required_signatures" --jq '.enabled')
          if [ "${enabled}" != "true" ]; then
            echo "::error::required_signatures drift on main: expected true, got '${enabled}'"
            exit 1
          fi
          echo "signed-commits enforcement on main: enabled"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          # tech-memes (public) carries memes.json; the inline vitest run
          # below includes the sync-memes round-trip test, which reads it.
          # ci.yml checks it out the same way; without this the deploy job
          # fails on a test that is green on PRs.
          submodules: true
          # On workflow_run we must explicitly check out the SHA that
          # triggered CI — the default would be main's tip at queue
          # time, which may have moved.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Inline test run because automatic CI is disabled (see ci.yml header).
      # Without this, a manual workflow_dispatch could ship code with failing
      # vitest assertions. Drop when the CI workflow_run gate is re-enabled.
      - name: Test (vitest)
        run: npm test

      # Inline typecheck because automatic CI is disabled (see ci.yml header).
      # Without this, a manual workflow_dispatch could ship code that fails
      # `astro check`. Drop this step when the CI workflow_run gate is
      # re-enabled.
      #
      # `astro check` loads astro.config.mjs, which exits 1 when CI=true
      # without SITE_URL. GitHub sets CI=true on every step, so the
      # typecheck step needs SITE_URL too — not just the build step.
      - name: Typecheck (astro check)
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run check

      - name: Build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run build

      # Generate an SPDX-JSON SBOM from the source tree and place it
      # inside dist/ so it ships with the site at /.well-known/sbom.spdx.json.
      # The action also uploads a copy as a workflow artifact (90-day
      # retention) for retroactive lookup. Closes #143.
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: dist/.well-known/sbom.spdx.json
          artifact-name: sbom.spdx.json

      # Tar the dist/ tree so we can sign + attest a single artifact and
      # (in the deploy job) extract it back to sync. Hash the tarball
      # in the form the SLSA generator expects (`base64(sha256+name+nl)`).
      - name: Tar dist/
        run: tar -czf dist.tar.gz dist/

      - name: Hash tarball for SLSA provenance
        id: hash
        run: |
          set -euo pipefail
          hashes=$(sha256sum dist.tar.gz | base64 -w0)
          echo "hashes=${hashes}" >> "$GITHUB_OUTPUT"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-tarball
          path: dist.tar.gz
          retention-days: 7
          if-no-files-found: error

  # SLSA v1.0 build-L3 provenance. The reusable workflow runs as its
  # own GitHub-trusted builder so the resulting attestation is non-
  # forgeable per the L3 requirement; the provenance job_workflow_ref
  # claim points at the slsa-github-generator workflow file, NOT this
  # one, which is exactly what L3 wants. Output is uploaded as a
  # workflow artifact named after `provenance-name`.
  #
  # Deliberate SHA-pin exception: SLSA's L3 trust model authenticates
  # the published `vX.Y.Z` tag of the generator workflow itself, so
  # this `uses:` stays tag-pinned. See the slsa-github-generator
  # README's "Referencing SLSA builders and generators" section.
  #
  # v2.1.0 (latest as of 2026-05) embeds Node-20 internal action refs.
  # Blocks on upstream slsa-framework/slsa-github-generator#4490; tracked
  # locally as #389. GitHub flips the runner default to Node 24 on
  # 2026-06-16 and removes Node 20 entirely on 2026-09-16. Bump this pin
  # once upstream releases a Node-24-ready tag — see
  # scripts/assert-slsa-pin-fresh.sh, which turns the deadline into a
  # CI failure if the pin doesn't move.
  provenance:
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0  # zizmor: ignore[unpinned-uses]
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      provenance-name: dist.tar.gz.intoto.jsonl
      upload-assets: false
      # This repo is private. Without this override, the SLSA generator
      # halts in `privacy-check` to avoid exposing the private repo name
      # via the public Rekor transparency log. We deliberately want the
      # repo identity in Rekor — the whole point is verifiable provenance
      # tied to this repo + commit + workflow.
      private-repository: true

  deploy:
    name: Sign + sync to S3 + invalidate CloudFront
    needs: [build, provenance]
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      id-token: write

    # Targets the `production` GitHub Environment for variable
    # scoping (`vars.SITE_DOMAIN` etc. resolve from this env). No
    # required-reviewer gate is configured -- see the trust-model
    # block at the top of this file for why (Pro plan now permits
    # the rule, but enabling it would block the unattended monthly
    # `schedule:` deploy). The OIDC sub claim in the IAM trust
    # policy is bound to `environment:production`, so the env name
    # is the load-bearing claim, not just metadata.
    environment:
      name: production
      url: https://${{ vars.SITE_DOMAIN }}

    steps:
      - name: Download tarball artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-tarball
          path: .

      - name: Download provenance attestation
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist.tar.gz.intoto.jsonl
          path: .

      - name: Extract dist tarball
        run: tar -xzf dist.tar.gz

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Keyless sign-blob — Fulcio mints a short-lived cert tied to
      # this job's OIDC token (sub=environment:production), Rekor
      # records the inclusion-proof transparency entry, and we end up
      # with `dist.tar.gz.cosign.bundle` — a single Sigstore bundle that
      # contains the signature, the Fulcio cert, and the Rekor inclusion
      # proof. Anyone can verify against the OIDC issuer + identity below.
      # No long-lived signing key to manage or rotate.
      - name: Cosign sign-blob (keyless)
        env:
          COSIGN_YES: 'true'
        run: |
          set -euo pipefail
          cosign sign-blob \
            --bundle dist.tar.gz.cosign.bundle \
            dist.tar.gz

      # Place the artifacts inside dist/ so the existing S3 sync
      # publishes them at /.well-known/slsa/<file> alongside the rest
      # of the site. Visitors can `curl` them directly from the canonical
      # domain rather than from a separate release surface.
      - name: Stage SLSA artifacts under /.well-known/slsa/
        run: |
          set -euo pipefail
          mkdir -p dist/.well-known/slsa
          cp dist.tar.gz dist.tar.gz.cosign.bundle dist.tar.gz.intoto.jsonl \
            dist/.well-known/slsa/

      # Guard against silent build dropouts BEFORE any S3 sync runs.
      # Pass 3's `--delete` (added in #547 / #515) makes the html +
      # .well-known/ sync load-bearing for every artifact `/security/`
      # advertises (SBOM, security.txt, MTA-STS, SLSA bundle + provenance,
      # WKD policy). If an upstream step ever produces an empty / missing
      # file (syft regression, Astro endpoint returning 0 bytes, SLSA
      # staging skipped) we want the deploy to fail HERE, before
      # `--delete` wipes the existing prod copy.
      - name: Assert critical dist/ artifacts present
        run: |
          set -euo pipefail
          # Non-empty required: content drives the contract.
          required_nonempty=(
            dist/index.html
            dist/.well-known/security.txt
            dist/.well-known/mta-sts.txt
            dist/.well-known/sbom.spdx.json
            dist/.well-known/slsa/dist.tar.gz
            dist/.well-known/slsa/dist.tar.gz.cosign.bundle
            dist/.well-known/slsa/dist.tar.gz.intoto.jsonl
          )
          # Presence-only required: WKD `policy` is intentionally a zero-
          # byte file per the OpenPGP Web Key Directory spec (presence is
          # the signal). `-s` would false-fail it.
          required_exists=(
            dist/.well-known/openpgpkey/policy
          )
          missing=0
          for f in "${required_nonempty[@]}"; do
            if [ ! -s "$f" ]; then
              echo "::error::missing or empty: $f"
              missing=1
            fi
          done
          for f in "${required_exists[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::missing: $f"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Tiered Cache-Control: hashed `_astro/` assets are content-addressed
      # and safe to cache forever; `/.well-known/` + `*.html` must stay
      # fresh (security.txt's monthly Expires refresh, route shape) so they
      # get a 5m TTL with must-revalidate; remaining static assets (images,
      # fonts, manifests) sit in the middle at 1d.
      #
      # `--delete` is set on all three passes. `aws s3 sync`'s
      # `--exclude`/`--include` filters apply to both the source and
      # destination listings, so pass 3's `--delete` only removes S3
      # objects matching `*.html` or `.well-known/*` (recursive — the
      # `.well-known/*` glob covers `.well-known/slsa/...` etc.) that
      # no longer exist locally; it cannot touch `_astro/`, images,
      # fonts, or other tiers covered by passes 1 and 2.
      #
      # The leading `--exclude "*"` on pass 3 is LOAD-BEARING — without
      # it `--include` is a no-op (everything is implicitly included)
      # and `--delete` would scope to the entire bucket. Never reorder
      # or drop that exclude. The "Assert critical dist/ artifacts
      # present" step above is the safety net catching the other failure
      # mode (build-time generator silently produces an empty file).
      #
      # Cache-Control is applied on every upload because Astro rebuilds
      # all of dist/ on each run, making local mtime newer than the S3
      # object — so sync re-uploads and the new header lands. First deploy
      # after enabling will backfill all changed files; for any unchanged
      # objects whose metadata didn't update, force a one-time refresh
      # with: aws s3 cp s3://... s3://... --recursive --metadata-directive REPLACE --cache-control "..."
      - name: Sync _astro/ to S3 (immutable, 1y)
        env:
          SITE_DOMAIN: ${{ vars.SITE_DOMAIN }}
        run: |
          aws s3 sync dist/_astro/ "s3://${SITE_DOMAIN}/_astro/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      # The `files/account-recovery-keys.pdf` exclude is LOAD-BEARING for the
      # AWS-key canary (#141): the live prod object carries the deny-all bait
      # key and is planted out-of-band, while the repo placeholder is keyless
      # so the key never lands in git. Without the exclude, every deploy would
      # overwrite the keyed prod copy with the keyless placeholder and kill the
      # canary. The exclude also stops `--delete` from removing the keyed copy.
      - name: Sync static assets to S3 (1d)
        env:
          SITE_DOMAIN: ${{ vars.SITE_DOMAIN }}
        run: |
          aws s3 sync dist/ "s3://${SITE_DOMAIN}" --delete \
            --exclude "_astro/*" \
            --exclude ".well-known/*" \
            --exclude "*.html" \
            --exclude "files/account-recovery-keys.pdf" \
            --cache-control "public, max-age=86400"

      - name: Sync html + .well-known/ to S3 (5m, must-revalidate)
        env:
          SITE_DOMAIN: ${{ vars.SITE_DOMAIN }}
        run: |
          aws s3 sync dist/ "s3://${SITE_DOMAIN}" --delete \
            --exclude "*" \
            --include "*.html" \
            --include ".well-known/*" \
            --cache-control "public, max-age=300, must-revalidate"

      - name: Invalidate CloudFront
        run: >-
          aws cloudfront create-invalidation
          --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
          --paths "/*"

  # Self-heal a transient failure on the unattended monthly cron (#708).
  # The dominant deploy.yml failure mode is a Sigstore public-good timeout
  # (Fulcio/Rekor keyless signing) in the `provenance` job — a one-off blip
  # a plain re-run clears. GitHub Actions has no native retry around a
  # reusable-workflow `uses:` job, and a job cannot `gh run rerun` its own
  # still-in-progress run, so this re-DISPATCHES deploy.yml once via
  # workflow_dispatch with `is_retry=true`.
  #
  # Loop bound: the re-dispatched run is a `workflow_dispatch` event, not
  # `schedule`, so this job's `if` guard is false on the retry run — exactly
  # one retry per failed scheduled run, no recursion. `gh workflow run` with
  # the default GITHUB_TOKEN does start a new run (workflow_dispatch is an
  # explicit exception to the no-recursion rule — GitHub changelog
  # 2022-09-08), so no PAT is needed; the job only needs `actions: write`.
  #
  # The re-dispatched run still executes deploy.yml@refs/heads/main, so its
  # OIDC sub (environment:production) + job_workflow_ref pin are unchanged —
  # the IAM trust boundary documented at the top of this file still holds.
  retry:
    name: Auto-retry failed scheduled run (once)
    needs: [build, provenance, deploy]
    if: ${{ always() && contains(needs.*.result, 'failure') && github.event_name == 'schedule' }}
    runs-on: ubuntu-24.04
    permissions:
      actions: write
    steps:
      - name: Re-dispatch deploy.yml once
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          echo "Scheduled run failed (${RUN_URL}); re-dispatching deploy.yml once as is_retry=true."
          gh workflow run deploy.yml --repo "$REPO" --ref main -f is_retry=true

  # Visibility floor for a PERSISTENT unattended failure (#705 / #708). The
  # `retry` job above already absorbs the common transient Sigstore blip by
  # re-dispatching once, so this only fires when a failure survives that
  # retry — i.e. the auto-retry run (`is_retry=true`) itself failed, or the
  # scheduled `retry` job couldn't even re-dispatch. Either way a human is
  # needed, so it opens / comments a single tracking issue. Manual dispatches
  # (a human at the console, `is_retry=false`) deliberately don't notify.
  notify-failure:
    name: Surface persistent unattended deploy failure
    needs: [build, provenance, deploy, retry]
    if: >-
      ${{ always() &&
          (
            (github.event_name == 'schedule' && needs.retry.result == 'failure') ||
            (github.event_name == 'workflow_dispatch' && github.event.inputs.is_retry == 'true' && contains(needs.*.result, 'failure'))
          ) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or update tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          label="deploy-failure"
          title="Scheduled deploy failed (after auto-retry) — security.txt Expires may be drifting"
          body="The monthly scheduled deploy.yml run failed AND its one automatic retry did not recover it: ${RUN_URL} . This is the unattended cron that keeps /.well-known/security.txt's Expires: field fresh. Because the auto-retry (#708) already cleared the common one-off Sigstore public-good timeout, a failure that reaches here is likely persistent (see #705) — investigate the linked run rather than just re-dispatching, then close this issue."
          gh label create "$label" --repo "$REPO" --color b60205 \
            --description "Unattended scheduled deploy failed" --force >/dev/null 2>&1 || true
          existing=$(gh issue list --repo "$REPO" --state open --label "$label" \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" --body "$body"
          else
            gh issue create --repo "$REPO" --title "$title" --label "$label" --body "$body"
          fi
