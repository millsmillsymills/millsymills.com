name: CI

# TEMPORARY: automatic triggers are disabled while we're over the
# GitHub Actions minute quota. Run ./scripts/ci-local.sh locally for
# pre-merge verification. To re-enable, restore the `pull_request` and
# `push` triggers below.
#
# When un-commenting: verify the `env: SITE_URL` blocks on both the
# Typecheck and Build steps are still present. astro.config.mjs throws
# if CI=true and SITE_URL is unset; silent drift here would break every
# triggered run on the first PR after re-enabling. See #77.
on:
  workflow_dispatch:
  # pull_request:
  #   branches: [main]
  # push:
  #   branches: [main]

permissions:
  contents: read

jobs:
  astro:
    name: Astro build + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Assert icon assets referenced by apps.ts exist
        run: ./scripts/assert-icon-assets-exist.sh

      # `astro check` loads astro.config.mjs, which exits 1 when CI=true
      # without SITE_URL. GitHub sets CI=true on every step, so the
      # typecheck step needs SITE_URL too — not just the build step.
      - name: Typecheck (astro check)
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run check

      - name: Build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run build

  terraform:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.10.3
          terraform_wrapper: false

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false -input=false

      - name: terraform validate
        run: terraform validate
