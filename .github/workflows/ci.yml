name: CI

# TEMPORARY: automatic triggers are disabled while we're over the
# GitHub Actions minute quota. Run ./scripts/ci-local.sh locally for
# pre-merge verification. To re-enable, restore the `pull_request` and
# `push` triggers below.
on:
  workflow_dispatch:
  # pull_request:
  #   branches: [main]
  # push:
  #   branches: [main]

permissions:
  contents: read

jobs:
  astro:
    name: Astro build + typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Assert icon assets referenced by apps.ts exist
        run: ./scripts/assert-icon-assets-exist.sh

      - name: Assert /api/tls/* response-headers policy attached
        run: ./scripts/assert-api-tls-headers-policy.sh

      - name: Test (vitest)
        run: npm test

      # `astro check` loads astro.config.mjs, which exits 1 when CI=true
      # without SITE_URL. GitHub sets CI=true on every step, so the
      # typecheck step needs SITE_URL too — not just the build step.
      - name: Typecheck (astro check)
        env:
          # Hardcoded rather than ${{ vars.SITE_URL }} — ci.yml only
          # typechecks + builds (artifacts are never deployed), the
          # site domain is public, and a missing repo variable would
          # silently fail astro.config.mjs's CI=true SITE_URL guard.
          # Real deploys still resolve SITE_URL per-environment via
          # deploy.yml / deploy-rehearsal.yml.
          SITE_URL: https://millsymills.com
        run: npm run check

      - name: Build
        env:
          # Hardcoded rather than ${{ vars.SITE_URL }} — ci.yml only
          # typechecks + builds (artifacts are never deployed), the
          # site domain is public, and a missing repo variable would
          # silently fail astro.config.mjs's CI=true SITE_URL guard.
          # Real deploys still resolve SITE_URL per-environment via
          # deploy.yml / deploy-rehearsal.yml.
          SITE_URL: https://millsymills.com
        run: npm run build

      - name: Install Playwright browsers (chromium)
        # Skip `--with-deps` because GitHub-hosted ubuntu-24.04 already
        # ships every shared library Chromium needs (~5s vs ~45s for apt).
        run: npx playwright install chromium

      - name: Test (playwright e2e)
        # Deep-link suite drives the prebuilt dist/ via `astro preview`,
        # so it runs after Build. Playwright's webServer block boots
        # preview on 127.0.0.1:4321 for the duration of the run.
        run: npm run test:e2e

      - name: Assert og:image per-app gate
        run: node scripts/assert-og-image-per-app.mjs

      - name: Assert SRI on every cross-origin asset
        run: node scripts/assert-sri-on-cross-origin-assets.mjs

  terraform:
    name: Terraform fmt + validate
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: 1.10.3
          terraform_wrapper: false

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false -input=false

      - name: terraform validate
        run: terraform validate
