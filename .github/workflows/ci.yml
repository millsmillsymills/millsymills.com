name: CI

# Auto-triggers run on every PR targeting `main` and on every push
# to `main`. The Pro plan upgrade in #144 lifted the minute-quota
# constraint that previously forced these to be commented out.
# `workflow_dispatch` stays enabled so re-runs can be kicked off
# manually without a no-op commit.
#
# Mirror of `scripts/ci-local.sh`. The two MUST stay in lockstep
# (#332): every gate that runs locally has to run here too, or
# `workflow_dispatch` / `schedule:` deploys can ship code that
# fails a gate that PRs no longer caught. The job split below
# keeps the wall-clock down (parallel runners) without losing
# coverage.
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref so push-after-squash to main
# doesn't double-bill (closing PR run + new main run), and rapid PR
# branch pushes don't queue redundant work.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  astro:
    name: Astro build + typecheck + asserts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ---- pre-build asserts (no dist/ needed) ----
      - name: Assert icon assets referenced by apps.ts exist
        run: ./scripts/assert-icon-assets-exist.sh

      - name: Assert PGP fingerprint + WKD binary consistency
        run: ./scripts/assert-pgp-consistency.sh

      - name: Assert browserStorage keys documented in privacy-copy
        run: node scripts/assert-privacy-storage-keys.mjs

      - name: Assert security-controls.ts code paths resolve
        run: ./scripts/assert-security-controls-paths.sh

      - name: Assert COOP / COEP / CORP headers wired
        run: ./scripts/assert-coop-coep-corp.sh

      - name: Assert Permissions-Policy header wired
        run: ./scripts/assert-permissions-policy.sh

      - name: Assert /api/tls/* response-headers policy attached
        run: ./scripts/assert-api-tls-headers-policy.sh

      - name: Test (vitest)
        run: npm test

      # `astro check` loads astro.config.mjs, which exits 1 when CI=true
      # without SITE_URL. GitHub sets CI=true on every step, so the
      # typecheck step needs SITE_URL too — not just the build step.
      - name: Typecheck (astro check)
        env:
          # Hardcoded rather than ${{ vars.SITE_URL }} — ci.yml only
          # typechecks + builds (artifacts are never deployed), the
          # site domain is public, and a missing repo variable would
          # silently fail astro.config.mjs's CI=true SITE_URL guard.
          # Real deploys still resolve SITE_URL per-environment via
          # deploy.yml / deploy-rehearsal.yml.
          SITE_URL: https://millsymills.com
        run: npm run check

      - name: Build
        env:
          SITE_URL: https://millsymills.com
        run: npm run build

      - name: Install Playwright browsers (chromium)
        # Skip `--with-deps` because GitHub-hosted ubuntu-24.04 already
        # ships every shared library Chromium needs (~5s vs ~45s for apt).
        run: npx playwright install chromium

      - name: Test (playwright e2e)
        # Deep-link suite drives the prebuilt dist/ via `astro preview`,
        # so it runs after Build. Playwright's webServer block boots
        # preview on 127.0.0.1:4321 for the duration of the run.
        # astro preview reloads astro.config.mjs, whose CI=true guard
        # demands SITE_URL — same hardcoded value as Typecheck/Build.
        env:
          SITE_URL: https://millsymills.com
        run: npm run test:e2e

      # ---- post-build asserts (consume dist/) ----
      - name: Assert fonts present + no Google Fonts leakage
        run: ./scripts/assert-fonts-csp.sh

      - name: Assert og:image per-app gate
        run: node scripts/assert-og-image-per-app.mjs

      - name: Assert SRI on every cross-origin asset
        run: node scripts/assert-sri-on-cross-origin-assets.mjs

      - name: Assert llms.txt enumerates every app + well-known path
        run: ./scripts/assert-llms-txt-completeness.sh

      # The two leakage scripts re-build internally with the opposite
      # SITE_URL, so they're independent of the dist/ produced above.
      - name: Assert no URL leakage (rehearsal direction)
        run: ./scripts/assert-no-url-leakage.sh

      - name: Assert no rehearsal URL leakage (prod direction)
        run: ./scripts/assert-no-rehearsal-leakage.sh

  terraform:
    name: Terraform fmt + validate + stack consistency
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: 1.10.3
          terraform_wrapper: false

      - name: terraform fmt
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        working-directory: infra
        run: terraform init -backend=false -input=false

      - name: terraform validate
        working-directory: infra
        run: terraform validate

      # tf.sh refusal checks + per-stack workflow / environment
      # consistency. These are inline rather than calling ci-local.sh
      # so each gate fails as its own visible step rather than under
      # one umbrella section. Mirror of the matching blocks in
      # scripts/ci-local.sh.
      - name: tf.sh refuses invalid stack
        run: |
          if ./scripts/tf.sh definitely-not-a-stack plan >/dev/null 2>&1; then
            echo "tf.sh accepted an invalid stack name" >&2
            exit 1
          fi

      - name: tf.sh refuses missing init
        run: |
          rm -rf infra/.terraform
          if ./scripts/tf.sh p41m0n plan >/dev/null 2>&1; then
            echo "tf.sh did not catch missing init" >&2
            exit 1
          fi

      - name: tf.sh refuses wrong-stack marker
        run: |
          mkdir -p infra/.terraform
          printf 'millsymills\n' > infra/.terraform/.stack
          if ./scripts/tf.sh p41m0n plan >/dev/null 2>&1; then
            echo "tf.sh did not catch wrong-stack marker" >&2
            rm -rf infra/.terraform
            exit 1
          fi
          rm -rf infra/.terraform

      - name: tf.sh refuses force-unlock against wrong stack
        run: |
          # Capture stderr separately so pipefail doesn't conflate
          # tf.sh's expected nonzero exit (4) with a pipeline failure.
          unlock_stderr=$(./scripts/tf.sh p41m0n force-unlock fake-id 2>&1 1>/dev/null || true)
          if ! grep -q 'refusing:' <<<"$unlock_stderr"; then
            echo "tf.sh did not guard force-unlock against wrong stack" >&2
            exit 1
          fi

      - name: per-stack deploy_workflow files exist
        run: |
          set -euo pipefail
          for tfv in infra/stacks/*.tfvars; do
            stack=$(basename "$tfv" .tfvars)
            wf=$(grep -E '^deploy_workflow' "$tfv" 2>/dev/null | head -1 | sed -E 's/.*"([^"]+)".*/\1/' || true)
            wf=${wf:-deploy.yml}
            if [ ! -f ".github/workflows/$wf" ]; then
              echo "stack $stack references missing workflow .github/workflows/$wf" >&2
              exit 1
            fi
          done

      - name: per-stack deploy_environment matches workflow's environment block
        run: |
          set -euo pipefail
          for tfv in infra/stacks/*.tfvars; do
            stack=$(basename "$tfv" .tfvars)
            wf=$(grep -E '^deploy_workflow' "$tfv" 2>/dev/null | head -1 | sed -E 's/.*"([^"]+)".*/\1/' || true)
            wf=${wf:-deploy.yml}
            tfv_env=$(grep -E '^deploy_environment' "$tfv" 2>/dev/null | head -1 | sed -E 's/.*"([^"]+)".*/\1/' || true)
            tfv_env=${tfv_env:-production}
            wf_env=$(awk '/^[[:space:]]*environment:[[:space:]]*$/{flag=1; next} flag && /^[[:space:]]*name:/{print $2; exit}' ".github/workflows/$wf" | tr -d '"' || true)
            if [ -z "$wf_env" ]; then
              echo "stack $stack: workflow $wf has no \`environment: name:\` field" >&2
              exit 1
            fi
            if [ "$tfv_env" != "$wf_env" ]; then
              echo "stack $stack: tfvars deploy_environment=$tfv_env != workflow $wf environment=$wf_env (OIDC trust will reject)" >&2
              exit 1
            fi
          done

  python:
    name: ct_monitor unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: '3.13'

      - name: Run ct_monitor unit tests
        # Stdlib-only; no dependencies to install. Mirror of the
        # python: ct_monitor block in scripts/ci-local.sh.
        run: python3 -m unittest discover -s infra/tests -t .

  actions-lint:
    name: Workflow security audit (zizmor)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install zizmor
        run: pipx install zizmor==1.24.1

      - name: Audit .github/workflows/ (medium+ findings)
        run: zizmor --min-severity medium .github/workflows/
