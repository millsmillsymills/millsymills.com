name: Deploy (rehearsal — p41m0n.com)

# This workflow deploys the Astro site to the p41m0n.com rehearsal stack.
# Manual dispatch only — never chain off push/CI. The rehearsal stack is
# a throwaway dress rehearsal, not a production target.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for AWS OIDC

concurrency:
  group: deploy-rehearsal
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + sync to S3 + invalidate CloudFront (rehearsal)
    runs-on: ubuntu-24.04

    # Targets the `rehearsal` GitHub Environment for variable scoping.
    # On the free-private plan there is no required-reviewer gate
    # available — see the trust-model block in `deploy.yml`'s header
    # for the full model. Workflow_dispatch is the only trigger here,
    # so each rehearsal run already requires a deliberate human
    # action at trigger time.
    environment:
      name: rehearsal
      url: https://${{ vars.SITE_DOMAIN }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test (vitest)
        run: npm test

      # `astro check` loads astro.config.mjs, which exits 1 when CI=true
      # without SITE_URL. GitHub sets CI=true on every step, so the
      # typecheck step needs SITE_URL too — not just the build step.
      - name: Typecheck (astro check)
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run check

      - name: Build (rehearsal env)
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          NO_INDEX: 'true'
          CI: 'true'
        run: npm run build

      # Generate an SPDX-JSON SBOM from the source tree and ship it
      # alongside the site at /.well-known/sbom.spdx.json. Mirrors the
      # production deploy step — the rehearsal stack should produce
      # identical artifacts. Closes #143.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/.well-known/sbom.spdx.json
          artifact-name: sbom.spdx.json

      # Run after SBOM generation so the SBOM is included in the grep —
      # a future dep referencing https://p41m0n.com would surface here.
      - name: Assert no URL leakage
        run: ./scripts/assert-no-url-leakage.sh

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync dist/ to S3
        run: aws s3 sync dist/ "s3://${{ vars.SITE_DOMAIN }}" --delete

      - name: Invalidate CloudFront
        run: >-
          aws cloudfront create-invalidation
          --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
          --paths "/*"
