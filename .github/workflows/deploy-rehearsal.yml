name: Deploy (rehearsal — p41m0n.com)

# This workflow deploys the Astro site to the p41m0n.com rehearsal stack.
# Manual dispatch only — never chain off push/CI. The rehearsal stack is
# a throwaway dress rehearsal, not a production target.
#
# Mirrors deploy.yml's SLSA L3 + sigstore signing flow so the rehearsal
# stack produces the same artifact set under /.well-known/slsa/. Keep
# the two workflows in sync — the rehearsal exists to catch deploy-
# pipeline bugs before they hit prod.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for AWS OIDC + sigstore keyless signing

concurrency:
  group: deploy-rehearsal
  cancel-in-progress: false

jobs:
  build:
    name: Build + SBOM + tarball (rehearsal)
    runs-on: ubuntu-24.04

    # Pull `vars.SITE_URL` (and friends) from the rehearsal environment.
    # Required because typecheck + build read env-scoped vars; without this
    # binding, `vars.SITE_URL` resolves to '' and astro.config.mjs rejects
    # the build. The deploy job below targets the same environment for
    # OIDC + IAM scoping.
    environment:
      name: rehearsal
      url: https://${{ vars.SITE_DOMAIN }}

    permissions:
      contents: read
      id-token: write

    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test (vitest)
        run: npm test

      # `astro check` loads astro.config.mjs, which exits 1 when CI=true
      # without SITE_URL. GitHub sets CI=true on every step, so the
      # typecheck step needs SITE_URL too — not just the build step.
      - name: Typecheck (astro check)
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run check

      - name: Build (rehearsal env)
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          NO_INDEX: 'true'
          CI: 'true'
        run: npm run build

      # Generate an SPDX-JSON SBOM from the source tree and ship it
      # alongside the site at /.well-known/sbom.spdx.json. Mirrors the
      # production deploy step — the rehearsal stack should produce
      # identical artifacts. Closes #143.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/.well-known/sbom.spdx.json
          artifact-name: sbom.spdx.json

      # Run after SBOM generation so the SBOM is included in the grep —
      # a future dep referencing https://p41m0n.com would surface here.
      - name: Assert no URL leakage
        run: ./scripts/assert-no-url-leakage.sh

      - name: Tar dist/
        run: tar -czf dist.tar.gz dist/

      - name: Hash tarball for SLSA provenance
        id: hash
        run: |
          set -euo pipefail
          hashes=$(sha256sum dist.tar.gz | base64 -w0)
          echo "hashes=${hashes}" >> "$GITHUB_OUTPUT"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-tarball
          path: dist.tar.gz
          retention-days: 7
          if-no-files-found: error

  provenance:
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      provenance-name: dist.tar.gz.intoto.jsonl
      upload-assets: false
      # This repo is private. Without this override, the SLSA generator
      # halts in `privacy-check` to avoid exposing the private repo name
      # via the public Rekor transparency log. We deliberately want the
      # repo identity in Rekor — the whole point is verifiable provenance
      # tied to this repo + commit + workflow.
      private-repository: true

  deploy:
    name: Sign + sync to S3 + invalidate CloudFront (rehearsal)
    needs: [build, provenance]
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      id-token: write

    # Targets the `rehearsal` GitHub Environment for variable scoping.
    # On the free-private plan there is no required-reviewer gate
    # available — see the trust-model block in `deploy.yml`'s header
    # for the full model. Workflow_dispatch is the only trigger here,
    # so each rehearsal run already requires a deliberate human
    # action at trigger time.
    environment:
      name: rehearsal
      url: https://${{ vars.SITE_DOMAIN }}

    steps:
      - name: Download tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-tarball
          path: .

      - name: Download provenance attestation
        uses: actions/download-artifact@v4
        with:
          name: dist.tar.gz.intoto.jsonl
          path: .

      - name: Extract dist tarball
        run: tar -xzf dist.tar.gz

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign sign-blob (keyless)
        env:
          COSIGN_YES: 'true'
        run: |
          set -euo pipefail
          cosign sign-blob \
            --output-signature dist.tar.gz.sig \
            --output-certificate dist.tar.gz.pem \
            dist.tar.gz

      - name: Stage SLSA artifacts under /.well-known/slsa/
        run: |
          set -euo pipefail
          mkdir -p dist/.well-known/slsa
          cp dist.tar.gz dist.tar.gz.sig dist.tar.gz.pem dist.tar.gz.intoto.jsonl \
            dist/.well-known/slsa/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync dist/ to S3
        run: aws s3 sync dist/ "s3://${{ vars.SITE_DOMAIN }}" --delete

      - name: Invalidate CloudFront
        run: >-
          aws cloudfront create-invalidation
          --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
          --paths "/*"
