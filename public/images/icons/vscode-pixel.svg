<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <title>vscode.exe</title>
  <desc>VS Code ribbon logo, pixel-art. Drawn on a 16x16 integer grid with crispEdges so the silhouette reads as chunky pixels when CSS scales the icon up under image-rendering: pixelated.</desc>

  <!-- Outer wedge body: chevron from the left tip out to the ribbon strip -->
  <path d="M1,8 L9,0 L13,0 L13,16 L9,16 Z" fill="#22C3FF"/>

  <!-- Inner fold shadow: darker triangle that suggests the ribbon
       wrapping behind itself. Lands a couple pixels in from the wedge
       edge so the lighter cyan stays visible at the silhouette. -->
  <path d="M5,8 L13,1 L13,15 Z" fill="#005A9E"/>

  <!-- Right ribbon strip — overlays the wedge so the front face of
       the ribbon is solid cyan. -->
  <rect x="13" y="0" width="2" height="16" fill="#22C3FF"/>

  <!-- Top and bottom highlight pixels on the strip for a hint of
       neon-noir glow consistent with the rest of the icon grid. -->
  <rect x="13" y="0" width="2" height="1" fill="#7FE7FF"/>
  <rect x="13" y="15" width="2" height="1" fill="#7FE7FF"/>
</svg>
